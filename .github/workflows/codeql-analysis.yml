name: CodeQL
'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      languages:
        description: Languages to analyze
        required: true
        default: java
jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          build-mode: manual
      - name: Build
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assemble --no-daemon \
              -Dorg.gradle.jvm.toolchain.install.auto=false \
              -Dorg.gradle.warning.mode=none \
              || echo "Gradle build failed, continuing with partial results"
          elif [ -f "pom.xml" ]; then
            mvn compile -B -q || echo "Maven build failed, continuing with partial results"
          fi
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:java'
